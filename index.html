
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>DLXR Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0e1a;
      --panel:     #0f1628;
      --border:    #1e2d4a;
      --accent:    #00d4ff;
      --accent2:   #ff6b35;
      --green:     #00ff9d;
      --yellow:    #ffd700;
      --red:       #ff3b5c;
      --text:      #e0eeff;
      --muted:     #4a6080;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Exo 2', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--mono);
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .logo span { color: var(--accent2); }

    #ble-btn {
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    #ble-btn:hover { background: var(--accent); color: var(--bg); }
    #ble-btn.connected { border-color: var(--green); color: var(--green); }
    #ble-btn.connected:hover { background: var(--green); color: var(--bg); }

    /* ── MAP ── */
    #map {
      flex: 1;
      width: 100%;
      z-index: 1;
    }

    /* ── BOTTOM PANEL ── */
    #panel {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 10px 16px 14px;
      flex-shrink: 0;
      z-index: 1000;
    }

    /* État drone */
    #state-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    #state-badge {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 3px;
      letter-spacing: 2px;
      background: var(--muted);
      color: var(--bg);
      transition: all 0.3s;
    }

    #state-badge.BOOT   { background: var(--yellow); }
    #state-badge.LOW    { background: var(--accent);  }
    #state-badge.HIGH   { background: var(--green);   }
    #state-badge.GROUND { background: var(--accent2); }

    #rssi-val {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* Grille de métriques */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .metric {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }

    .metric-label {
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .metric-value {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Coords pleine largeur */
    .metric.full { grid-column: 1 / -1; }
    .metric.full .metric-value { font-size: 0.85rem; color: var(--text); }

    /* ── STATUS BAR ── */
    #status {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* ── LEAFLET CUSTOM MARKER ── */
    .drone-marker {
      width: 16px;
      height: 16px;
      position: relative;
    }
    .drone-marker::before,
    .drone-marker::after {
      content: '';
      position: absolute;
      background: #00d4ff;
    }
    .drone-marker::before {
      width: 16px; height: 2px;
      top: 7px; left: 0;
    }
    .drone-marker::after {
      width: 2px; height: 16px;
      top: 0; left: 7px;
    }
    .drone-dot {
      position: absolute;
      width: 4px; height: 4px;
      background: #ff6b35;
      border-radius: 50%;
      top: 6px; left: 6px;
    }

    /* Leaflet dark theme */
    .leaflet-tile { filter: brightness(0.85) saturate(0.7) hue-rotate(180deg) invert(1); }
    .leaflet-container { background: #0a0e1a; }

    /* Bouton centrer */
    #center-btn {
      position: absolute;
      bottom: 220px;
      right: 16px;
      z-index: 999;
      background: var(--panel);
      border: 1.5px solid var(--border);
      color: var(--accent);
      width: 40px;
      height: 40px;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">DL<span>X</span>R</div>
    <button id="ble-btn" onclick="connectBLE()">⚡ CONNECTER</button>
  </header>

  <!-- MAP -->
  <div id="map"></div>

  <!-- BOUTON CENTRER -->
  <button id="center-btn" onclick="centerMap()" title="Centrer sur le drone">🎯</button>

  <!-- PANEL INFO -->
  <div id="panel">
    <div id="state-bar">
      <div id="state-badge">--</div>
      <div id="rssi-val">RSSI: --</div>
    </div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Altitude</div>
        <div class="metric-value" id="m-alt">-- m</div>
      </div>
      <div class="metric">
        <div class="metric-label">Distance</div>
        <div class="metric-value" id="m-dist">-- m</div>
      </div>
      <div class="metric">
        <div class="metric-label">Trames RX</div>
        <div class="metric-value" id="m-rx">0</div>
      </div>
      <div class="metric full">
        <div class="metric-label">Position GPS</div>
        <div class="metric-value" id="m-pos">Attente signal...</div>
      </div>
    </div>
    <div id="status">EN ATTENTE DE CONNEXION BLE</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── UUIDs BLE (identiques au RX Heltec) ──
    const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
    const CHARACT_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

    // ── État appli ──
    let bleDevice     = null;
    let bleCharact    = null;
    let rxCount       = 0;
    let droneMarker   = null;
    let tracePath     = [];
    let polyline      = null;
    let autoCenter    = true;
    let lastLat       = null;
    let lastLon       = null;

    // ── Init carte Leaflet ──
    const map = L.map('map', {
      center: [48.8566, 2.3522],
      zoom: 15,
      zoomControl: false
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    }).addTo(map);

    L.control.zoom({ position: 'topleft' }).addTo(map);

    // Désactiver auto-center si l'utilisateur déplace la carte
    map.on('dragstart', () => { autoCenter = false; });

    // ── Marker drone custom ──
    const droneIcon = L.divIcon({
      className: '',
      html: '<div class="drone-marker"><div class="drone-dot"></div></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8]
    });

    function updateMap(lat, lon) {
      const latlng = [lat, lon];

      if (!droneMarker) {
        droneMarker = L.marker(latlng, { icon: droneIcon }).addTo(map);
        map.setView(latlng, 16);
      } else {
        droneMarker.setLatLng(latlng);
      }

      // Tracé du parcours
      tracePath.push(latlng);
      if (polyline) {
        polyline.setLatLngs(tracePath);
      } else {
        polyline = L.polyline(tracePath, {
          color: '#00d4ff',
          weight: 2,
          opacity: 0.6,
          dashArray: '4 6'
        }).addTo(map);
      }

      if (autoCenter) map.panTo(latlng);
    }

    function centerMap() {
      autoCenter = true;
      if (lastLat !== null) map.setView([lastLat, lastLon], 16);
    }

    // ── Traitement trame JSON ──
    function handleData(json) {
      try {
        const d = JSON.parse(json);
        rxCount++;

        const etat  = (d.etat || '--').toUpperCase();
        const alt   = parseFloat(d.alt  || 0).toFixed(0);
        const dist  = parseFloat(d.dist || 0);
        const rssi  = parseFloat(d.rssi || 0).toFixed(0);
        const lat   = parseFloat(d.lat  || 0);
        const lon   = parseFloat(d.lon  || 0);

        // Badge état
        const badge = document.getElementById('state-badge');
        badge.textContent = etat;
        badge.className   = etat;

        // RSSI
        document.getElementById('rssi-val').textContent = `RSSI: ${rssi} dBm`;

        // Métriques
        document.getElementById('m-alt').textContent  = `${alt} m`;
        document.getElementById('m-dist').textContent = dist < 1000
          ? `${dist.toFixed(0)} m`
          : `${(dist / 1000).toFixed(2)} km`;
        document.getElementById('m-rx').textContent   = rxCount;

        const moved = d.moved !== false;  // true par défaut si absent

        if (lat !== 0 && lon !== 0) {
          lastLat = lat;
          lastLon = lon;
          document.getElementById('m-pos').textContent =
            `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        }

        if (etat === 'GROUND' && !moved) {
          document.getElementById('m-pos').textContent =
            `AU SOL — ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
          setStatus(`DRONE AU SOL — TRAME #${rxCount}`);
        } else {
          if (lat !== 0 && lon !== 0) updateMap(lat, lon);
          setStatus(`TRAME #${rxCount} — ${etat}`);
        }

      } catch (e) {
        console.error('Parse JSON erreur:', e, json);
        setStatus('ERREUR PARSING JSON');
      }
    }

    // ── BLE ──
    async function connectBLE() {
      if (!navigator.bluetooth) {
        setStatus('WEB BLUETOOTH NON SUPPORTÉ — UTILISE CHROME');
        return;
      }

      try {
        setStatus('RECHERCHE DLXR_RX...');
        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'DLXR_RX' }],
          optionalServices: [SERVICE_UUID]
        });

        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

        setStatus('CONNEXION EN COURS...');
        const server  = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        bleCharact    = await service.getCharacteristic(CHARACT_UUID);

        // Lire valeur initiale
        const val = await bleCharact.readValue();
        handleData(new TextDecoder().decode(val));

        // Activer notifications
        await bleCharact.startNotifications();
        bleCharact.addEventListener('characteristicvaluechanged', (e) => {
          const txt = new TextDecoder().decode(e.target.value);
          handleData(txt);
        });

        // UI connecté
        const btn = document.getElementById('ble-btn');
        btn.textContent = '✓ CONNECTÉ';
        btn.classList.add('connected');
        setStatus('BLE CONNECTÉ — EN ÉCOUTE');

      } catch (e) {
        console.error('BLE erreur:', e);
        setStatus('ERREUR BLE: ' + e.message);
      }
    }

    function onDisconnected() {
      const btn = document.getElementById('ble-btn');
      btn.textContent = '⚡ CONNECTER';
      btn.classList.remove('connected');
      setStatus('BLE DÉCONNECTÉ — APPUIE POUR RECONNECTER');
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
